{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="{% static 'images/favicon.png' %}" rel="icon">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(rgba(253,253,253,0.1), rgba(21,127,218,0.8));
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 420px;
            padding: 40px;
            border: none;
        }
        .card h2 {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: rgba(0,128,241,0.9);
            margin-bottom: 8px;
        }
        .card p { text-align: center; color: #888; font-size: 13px; margin-bottom: 24px; }
        .input-group {
            position: relative;
            margin: 25px 0;
            border-bottom: 2px solid black;
        }
        .input-group input {
            width: 100%;
            height: 40px;
            font-size: 16px;
            color: black;
            padding: 10px 30px 5px 5px;
            background: transparent;
            border: none;
            outline: none;
        }
        .input-group label {
            position: absolute;
            left: 5px;
            top: 10px;
            font-size: 16px;
            color: black;
            pointer-events: none;
            transition: 0.3s;
        }
        .input-group input:focus + label,
        .input-group input:not(:placeholder-shown) + label {
            top: -10px;
            font-size: 12px;
            color: rgba(21,127,218,1);
        }
        .toggle-eye {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
        }
        .toggle-eye i { font-size: 18px; color: black; }
        .btn-submit {
            width: 100%;
            padding: 12px;
            background: rgba(21,127,218,1);
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 30px;
            border: none;
            margin-top: 15px;
            transition: 0.3s;
        }
        .btn-submit:hover { background: rgba(21,127,218,0.8); }
        .back-link { text-align: center; margin-top: 16px; font-size: 14px; }
        .back-link a { color: rgba(21,127,218,1); text-decoration: none; font-weight: 500; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Reset Password</h2>
        <p>Enter your new password</p>

        {% if messages %}
            {% for message in messages %}
            <div class="alert alert-danger text-center">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="input-group">
                <input type="password" name="new_password" id="new_password" placeholder=" " required>
                <label for="new_password">New Password</label>
                <span class="toggle-eye" onclick="togglePass('new_password', this)">
                    <i class="fa-regular fa-eye"></i>
                </span>
            </div>
            <div class="input-group">
                <input type="password" name="confirm_password" id="confirm_password" placeholder=" " required>
                <label for="confirm_password">Confirm Password</label>
                <span class="toggle-eye" onclick="togglePass('confirm_password', this)">
                    <i class="fa-regular fa-eye"></i>
                </span>
            </div>
            <button type="submit" class="btn-submit">
                <i class="fas fa-save me-2"></i>Save New Password
            </button>
        </form>

        <div class="back-link">
            <p><a href="{% url 'login' %}">← Back to Login</a></p>
        </div>
    </div>

    <script>
        function togglePass(id, span) {
            const input = document.getElementById(id);
            const icon = span.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
