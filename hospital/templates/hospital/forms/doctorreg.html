{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="shortcut icon" href="{% static 'images/favicon.png' %}" type="image/x-icon" />

<title>Doctor Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(rgba(253,253,253,0.1), rgba(21,127,218,0.8));
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.form-container{
max-width:900px;
margin:auto;
}

.form-title{
color:#1a62ce;
font-weight:bold;
border-bottom:2px solid #0d6efd;
padding-bottom:8px;
}

.section-title{
color:#0b5ed7;
font-weight:bold;
margin-top:25px;
}

.submit{
width:20%;
padding:12px;
color:white;
background:#0079f1;
font-size:16px;
border:none;
border-radius:50px;
cursor:pointer;
}

@media(max-width:576px){
.submit{
width:60%;
}
}

</style>

</head>

<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-10 col-md-11">

<div class="form-container p-4 rounded shadow bg-white">

<h2 class="form-title text-center mb-4">Doctor Registration Form</h2>

<form method="POST" action="{% url 'doctorreg' %}" id="doctorForm">

{% csrf_token %}

<h4 class="section-title">Basic Information</h4>

<div class="row mb-3">

<div class="col-md-6">
<label class="form-label">Full Name</label>
<input type="text" name="fullname" value="{{ request.user.fullname }}" class="form-control" readonly>
</div>

<div class="col-md-6">
<label class="form-label">Father Name</label>
<input type="text" name="father_name" class="form-control" required>
<small id="guardianError" style="color:red;"></small>
</div>

</div>

<div class="row mb-3">

<div class="col-md-6">
<label class="form-label">Date of Birth</label>
<input type="date" name="dob" id="dob" class="form-control" required>
<small id="dobError" style="color:red;"></small>

</div>

<div class="col-md-6">
<label class="form-label">Gender</label>
<select name="gender" class="form-select" required>
<option value="">Select</option>
<option value="Male">Male</option>
<option value="Female">Female</option>
</select>
</div>

</div>

<div class="row mb-3">

<div class="col-md-6">
<label class="form-label">Email</label>
<input type="email" name="email" value="{{ request.user.email }}" class="form-control" readonly>
</div>

<div class="col-md-6">
<label class="form-label">CNIC</label>
<input type="text" name="cnic" id="cnic" maxlength="15" class="form-control" placeholder="35202-1234567-1" required>
<small id="cnicError" style="color:red;"></small>
</div>

</div>

<div class="row mb-3">

<div class="col-md-6">
<label class="form-label">Contact Number</label>
<input type="text" name="phone" id="phone" maxlength="11" class="form-control" placeholder="03XXXXXXXXX" required>
<small id="phoneError" style="color:red;"></small>
</div>

<div class="col-md-6">
<label class="form-label">Address</label>
<input type="text" name="address" class="form-control" required>
</div>

</div>

<h4 class="section-title mt-4">Professional Details</h4>

<div class="row mb-3">

<div class="col-md-6">

<label class="form-label">Department</label>

<select name="dept" class="form-select" required>

<option value="">Select</option>

{% for d in departments %}
<option value="{{ d.id }}">{{ d.name }}</option>
{% endfor %}

</select>

</div>

<div class="col-md-6">
<label class="form-label">Medical License</label>
<input type="text" name="license" class="form-control" required>
</div>

</div>

<div class="row mb-3">

<div class="col-md-6">
<label class="form-label">Qualification</label>
<input type="text" name="qualification" class="form-control" placeholder="MBBS, FCPS" required>
</div>

<div class="col-md-6">
<label class="form-label">Years of Experience</label>
<input type="number" name="experience" class="form-control" required>
</div>

<div class="col-md-6">
    <label class="form-label">Consultation Fee (PKR)</label>
    <input type="number" name="consultation_fee" id="fee" class="form-control" placeholder="e.g. 1500" required>
    <small id="feeError" style="color:red;"></small> </div>
</div>

<div class="text-center mt-4">

<button type="submit" class="submit">
Submit
</button>

</div>

</form>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>


<script>
// Today date set for DOB max
let today = new Date().toISOString().split("T")[0];
document.getElementById("dob").setAttribute("max", today);

// Guardian Name Validation
document.getElementById("doctorForm").addEventListener("submit", function(e){
    var name = document.getElementById("father_name").value.trim();
    var error = document.getElementById("guardianError");
    var pattern = /^[A-Za-z\s]{2,}$/;

    if(!pattern.test(name)){
        error.innerText = "Only letters and spaces are allowed and name must be at least 2 characters.";
        e.preventDefault();
    } else {
        error.innerText = "";
    }
});

// DOB Validation
document.getElementById("doctorForm").addEventListener("submit", function(e){
    let dob = document.getElementById("dob").value;
    let error = document.getElementById("dobError");
    let selectedDate = new Date(dob);
    let currentDate = new Date();

    if(selectedDate > currentDate){
        error.innerText = "Future date is not allowed.";
        e.preventDefault();
    } else {
        error.innerText = "";
    }
});

// CNIC Validation + Max Length Enforcement
const cnicInput = document.getElementById("cnic");
cnicInput.addEventListener("input", function(){
    // Limit total length to 15 characters (XXXXX-XXXXXXX-X)
    if(this.value.length > 15){
        this.value = this.value.slice(0,15);
    }
});
document.getElementById("doctorForm").addEventListener("submit", function(e){
    let cnic = cnicInput.value.trim();
    let error = document.getElementById("cnicError");
    let pattern = /^\d{5}-\d{7}-\d{1}$/;
    if(!pattern.test(cnic)){
        error.innerText = "CNIC must be in format XXXXX-XXXXXXX-X";
        e.preventDefault();
    } else {
        error.innerText = "";
    }
});

// Phone Validation + Max Length Enforcement
const phoneInput = document.getElementById("phone");
phoneInput.addEventListener("input", function(){
    if(this.value.startsWith("+92")){
        if(this.value.length > 13) this.value = this.value.slice(0,13); // +923XXXXXXXXX
    } else if(this.value.startsWith("03")){
        if(this.value.length > 11) this.value = this.value.slice(0,11); // 03XXXXXXXXX
    } else {
        // Prevent typing beyond max possible
        if(this.value.length > 13) this.value = this.value.slice(0,13);
    }
});
document.getElementById("doctorForm").addEventListener("submit", function(e){
    let phone = phoneInput.value.trim();
    let error = document.getElementById("phoneError");
    let pattern = /^03[0-9]{9}$|^\+923[0-9]{9}$/;
    if(!pattern.test(phone)){
        error.innerText = "Enter valid mobile number (11 digits starting with 03 or +923XXXXXXXXX).";
        e.preventDefault();
    } else {
        error.innerText = "";
    }
});

// Fee Validation (Add this inside your script)
document.getElementById("doctorForm").addEventListener("submit", function(e){
    let fee = document.getElementById("fee").value;
    let error = document.getElementById("feeError");

    if(fee < 0){
        error.innerText = "Fee cannot be negative.";
        e.preventDefault();
    } else {
        error.innerText = "";
    }
});
</script>


</body>
</html>
