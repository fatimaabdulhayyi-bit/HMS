{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Doctor Dashboard{% endblock %}</title>

  <link href="{% static 'images/favicon.png' %}" rel="icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
  <link rel="stylesheet" href="{% static 'css/doctor.css' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
  <div class="container-fluid">
    <div class="row flex-nowrap">
      
      <aside class="sidebar flex-column" id="sidebarMenu">
        <div class="sidebar-inner">
          <button class="btn sidebar-close d-lg-none" id="sidebarClose"><i class="fa fa-bars"></i></button>

          <div class="profile text-center my-3">
    <div class="profile-img-wrapper">
        {% if user.profile_image %}
            <img src="{{ user.profile_image.url }}" alt="Profile" class="sidebar-profile-img">
        {% else %}
            <div class="profile-img-placeholder">
                <i class="fa fa-user fa-2x"></i>
            </div>
        {% endif %}
    </div>
    
    <h4>Doctor</h4>
    <h6>{{ user.fullname }}</h6>
</div>

          <ul class="nav flex-column mb-auto w-100 menu">
            <li class="nav-item"><a href="{% url 'doctor_dashboard' %}" class="nav-link"><i class="fa fa-home me-2"></i>Dashboard</a></li>
            <li><a href="{% url 'my_appointments' %}" class="nav-link"><i class="fa fa-calendar-check me-2"></i>Appointments</a></li>
            <li><a href="{% url 'doctor_schedule' %}" class="nav-link"><i class="fa fa-clock me-2"></i>Schedules</a></li>
          </ul>
        </div>
      </aside>

      <main class="col py-0 px-0 main-content">
        <header class="topbar border-bottom pb-3 mb-3">
          <div class="topbar-left d-flex align-items-center gap-2">
            <button class="btn sidebar-toggle d-lg-none" type="button" id="sidebarToggle"><i class="fa fa-bars"></i></button>
            <img src="{% static 'images/logo.png' %}" alt="logo" class="logo">
          </div>
          <div class="topbar-right d-flex align-items-center gap-2">
            <button class="btn btn-light" id="notificationBtn"><i class="fa fa-bell fs-5"></i></button>
            <a href="{% url 'logout' %}" class="btn btn-danger"><i class="fa fa-sign-out-alt me-1"></i> Logout</a>
          </div>
        </header>

        {% block content %}{% endblock %}
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{% static 'js/dashboard.js' %}"></script>
</body>
</html>
