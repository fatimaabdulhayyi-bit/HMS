{% extends 'hospital/admin/base_admin.html' %}
{% load static %}

{% block title %}Update Doctor{% endblock %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4 px-4 pt-4">
  <h2 class="page-title">Update Doctor: {{ doctor.user.fullname }}</h2>
  <a href="{% url 'doctors' %}" class="btn-back">Back</a>
</div>

<div class="doctor-form-wrapper">

  <form method="POST" class="doctor-form" id="updateDoctorForm">
    {% csrf_token %}

    <div class="row g-4">
      <div class="col-md-6">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control" value="{{ doctor.user.fullname }}" readonly>
      </div>

      <div class="col-md-6">
        <label class="form-label">Father Name</label>
<input type="text" id="guardian_name" name="father_name" class="form-control" value="{{ doctor.father_name }}" required>
<small id="guardianError" style="color:red;"></small>
      </div>

      <div class="col-md-6">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" value="{{ doctor.user.email }}" readonly>
      </div>

      <div class="col-md-6">
       <label class="form-label">Phone</label>
<input type="text" id="phone" name="phone" class="form-control" value="{{ doctor.phone }}">
<small id="phoneError" style="color:red;"></small>
      </div>

      <div class="col-md-6">
        <label class="form-label">Date of Birth</label>
<input type="date" id="dob" name="dob" class="form-control" value="{{ doctor.dob|date:'Y-m-d' }}" required>
<small id="dobError" style="color:red;"></small>
      </div>

      <div class="col-md-6">
        <label class="form-label">Gender</label>
        <select name="gender" class="form-select">
          <option value="Male" {% if doctor.gender == "Male" %}selected{% endif %}>Male</option>
          <option value="Female" {% if doctor.gender == "Female" %}selected{% endif %}>Female</option>
          <option value="Other" {% if doctor.gender == "Other" %}selected{% endif %}>Other</option>
        </select>
      </div>

      <div class="col-md-6">
       <label class="form-label">CNIC</label>
<input type="text" id="cnic" name="cnic" class="form-control" value="{{ doctor.cnic }}">
<small id="cnicError" style="color:red;"></small>
      </div>

      <div class="col-md-6">
        <label class="form-label">Address</label>
        <textarea name="address" class="form-control" rows="2">{{ doctor.address }}</textarea>
      </div>
    </div>

    <h5 class="section-title">Professional Details</h5>
    <div class="row g-4">
      <div class="col-md-6">
        <label class="form-label">Department</label>
        <select name="dept" class="form-select">
          {% for d in departments %}
            <option value="{{ d.id }}" {% if doctor.department.id == d.id %}selected{% endif %}>{{ d.name }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="col-md-6">
        <label class="form-label">Qualification</label>
        <input type="text" name="qualification" class="form-control" value="{{ doctor.qualification }}">
      </div>

      <div class="col-md-6">
        <label class="form-label">Experience (Years)</label>
        <input type="number" name="experience" class="form-control" value="{{ doctor.experience }}">
      </div>

      <div class="col-md-6">
        <label class="form-label">Medical License</label>
        <input type="text" name="license_number" class="form-control" value="{{ doctor.license_number }}">
      </div>
    </div>

    <div class="mt-4">
      <label class="form-label">Status</label>
      <div class="d-flex gap-4">
        <label class="radio-label">
          <input type="radio" name="is_approved" value="True" {% if doctor.is_approved %}checked{% endif %}> Active
        </label>
        <label class="radio-label">
          <input type="radio" name="is_approved" value="False" {% if not doctor.is_approved %}checked{% endif %}> Inactive
        </label>
      </div>
    </div>

    <div class="text-center mt-5">
      <button type="submit" class="btn-submit">Update Doctor</button>
    </div>
  </form>
</div>
<script>

// Today date set for DOB max
let today = new Date().toISOString().split("T")[0];
document.getElementById("dob").setAttribute("max", today);


// FATHER NAME VALIDATION
document.getElementById("updateDoctorForm").addEventListener("submit", function(e){

    let name = document.getElementById("guardian_name").value.trim();
    let error = document.getElementById("guardianError");
    let pattern = /^[A-Za-z\s]{2,}$/;

    if(!pattern.test(name)){
        error.innerText = "Only letters and spaces allowed.";
        e.preventDefault();
    } else {
        error.innerText = "";
    }

});


// DOB VALIDATION
document.getElementById("updateDoctorForm").addEventListener("submit", function(e){

    let dob = document.getElementById("dob").value;
    let error = document.getElementById("dobError");

    let selectedDate = new Date(dob);
    let currentDate = new Date();

    if(selectedDate > currentDate){
        error.innerText = "Future date not allowed.";
        e.preventDefault();
    } else {
        error.innerText = "";
    }

});


// CNIC VALIDATION
const cnicInput = document.getElementById("cnic");

cnicInput.addEventListener("input", function(){
    if(this.value.length > 15){
        this.value = this.value.slice(0,15);
    }
});

document.getElementById("updateDoctorForm").addEventListener("submit", function(e){

    let cnic = cnicInput.value.trim();
    let error = document.getElementById("cnicError");

    let pattern = /^\d{5}-\d{7}-\d{1}$/;

    if(!pattern.test(cnic)){
        error.innerText = "CNIC format XXXXX-XXXXXXX-X";
        e.preventDefault();
    } else {
        error.innerText = "";
    }

});


// PHONE VALIDATION
const phoneInput = document.getElementById("phone");

phoneInput.addEventListener("input", function(){

    if(this.value.startsWith("+92")){
        if(this.value.length > 13) this.value = this.value.slice(0,13);

    } else if(this.value.startsWith("03")){
        if(this.value.length > 11) this.value = this.value.slice(0,11);

    } else {
        if(this.value.length > 13) this.value = this.value.slice(0,13);
    }

});

document.getElementById("updateDoctorForm").addEventListener("submit", function(e){

    let phone = phoneInput.value.trim();
    let error = document.getElementById("phoneError");

    let pattern = /^03[0-9]{9}$|^\+923[0-9]{9}$/;

    if(!pattern.test(phone)){
        error.innerText = "Enter valid mobile number (03XXXXXXXXX)";
        e.preventDefault();
    } else {
        error.innerText = "";
    }

});

</script>
{% endblock %}
