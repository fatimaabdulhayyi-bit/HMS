{% extends 'hospital/admin/base_admin.html' %}
{% load static %}

{% block title %}Update Department{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4 px-4 pt-4">
    <h2 class="page-title">Update Department: {{ dept.name }}</h2>
    <a href="{% url 'department' %}" class="btn-back">Cancel</a>
</div>

<div class="department-form-wrapper">
    <form method="POST" class="department-form">
        {% csrf_token %}

        <div class="form-group mb-3">
            <label class="form-label">Department Name</label>
            <input type="text" name="department_name" class="form-control" value="{{ dept.name }}" required>
        </div>

        <div class="form-group mb-3">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control textarea" rows="4">{{ dept.description }}</textarea>
        </div>

        <div class="form-group mb-3">
            <label class="form-label">Department Status</label>
            <div class="status-group d-flex gap-3">
                <label class="radio-label">
                    <input type="radio" name="status" value="Active" {% if dept.status %}checked{% endif %}> Active
                </label>
                <label class="radio-label">
                    <input type="radio" name="status" value="Inactive" {% if not dept.status %}checked{% endif %}> Inactive
                </label>
            </div>
        </div>

        <div class="text-center mt-4">
            <button type="submit" class="btn-submit">UPDATE DEPARTMENT</button>
        </div>
    </form>
</div>
{% endblock %}
