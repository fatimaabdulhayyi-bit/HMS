{% extends 'hospital/admin/base_admin.html' %}
{% load static %}

{% block title %}Add Doctor{% endblock %}

{% block content %}

{% if messages %}
    {% for message in messages %}
        <div class="alert alert-success text-center">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

<div class="d-flex justify-content-between align-items-center mb-4 px-4 pt-4">
  <h2 class="page-title">Add Doctor</h2>
  <a href="{% url 'doctors' %}" class="btn-back">Back</a>
</div>

<div class="doctor-form-wrapper">

<form method="POST" class="doctor-form" id="doctorForm">
{% csrf_token %}

<div class="row g-4">

<div class="col-md-6">
<label class="form-label">Full Name</label>
<input type="text" name="fullname" class="form-control" required>
</div>

<div class="col-md-6">
<label class="form-label">Father Name</label>
<input type="text" name="father_name" class="form-control" required>
<small id="guardianError" style="color:red;"></small>
</div>

<div class="col-md-6">
<label class="form-label">Email</label>
<input type="email" name="email" class="form-control" required>
</div>

<div class="col-md-6">
<label class="form-label">Phone</label>
<input type="text" id="phone" name="phone" maxlength="11" class="form-control" placeholder="03XXXXXXXXX">
<small id="phoneError" style="color:red;"></small>
</div>

<div class="col-md-6">
<label class="form-label">Date of Birth</label>
<input type="date" id="dob" name="dob" class="form-control" required>
<small id="dobError" style="color:red;"></small>
</div>

<div class="col-md-6">
<label class="form-label">Gender</label>
<select name="gender" class="form-select">
<option value="Male">Male</option>
<option value="Female">Female</option>
<option value="Other">Other</option>
</select>
</div>

<div class="col-md-6">
<label class="form-label">CNIC</label>
<input type="text" id="cnic" name="cnic" maxlength="15" class="form-control" placeholder="35202-1234567-1">
<small id="cnicError" style="color:red;"></small>'
</div>

<div class="col-md-6">
<label class="form-label">Address</label>
<textarea name="address" class="form-control" rows="2"></textarea>
</div>

</div>

<h5 class="section-title">Professional Details</h5>

<div class="row g-4">

<div class="col-md-6">
<label class="form-label">Department</label>
<select name="dept" class="form-select">
{% for d in departments %}
<option value="{{ d.id }}">{{ d.name }}</option>
{% endfor %}
</select>
</div>

<div class="col-md-6">
<label class="form-label">Qualification</label>
<input type="text" name="qualification" class="form-control">
</div>

<div class="col-md-6">
<label class="form-label">Experience (Years)</label>
<input type="number" name="experience" class="form-control">
</div>

<div class="col-md-6">
<label class="form-label">Medical License</label>
<input type="text" name="license_number" class="form-control">
</div>

</div>

<div class="mt-4">
<label class="form-label">Status</label>
<div class="d-flex gap-4">
<label class="radio-label">
<input type="radio" name="is_approved" value="True" checked> Active
</label>
<label class="radio-label">
<input type="radio" name="is_approved" value="False"> Inactive
</label>
</div>
</div>

<div class="text-center mt-5">
<button type="submit" class="btn-submit">Create Doctor</button>
</div>

</form>
</div>

<script>
// Today date set for DOB max
let today = new Date().toISOString().split("T")[0];
document.getElementById("dob").setAttribute("max", today);

// Guardian Name Validation
document.getElementById("doctorForm").addEventListener("submit", function(e){
    var name = document.getElementById("father_name").value.trim();
    var error = document.getElementById("guardianError");
    var pattern = /^[A-Za-z\s]{2,}$/;

    if(!pattern.test(name)){
        error.innerText = "Only letters and spaces are allowed and name must be at least 2 characters.";
        e.preventDefault();
    } else {
        error.innerText = "";
    }
});

// DOB Validation
document.getElementById("doctorForm").addEventListener("submit", function(e){
    let dob = document.getElementById("dob").value;
    let error = document.getElementById("dobError");
    let selectedDate = new Date(dob);
    let currentDate = new Date();

    if(selectedDate > currentDate){
        error.innerText = "Future date is not allowed.";
        e.preventDefault();
    } else {
        error.innerText = "";
    }
});

// CNIC Validation + Max Length Enforcement
const cnicInput = document.getElementById("cnic");
cnicInput.addEventListener("input", function(){
    // Limit total length to 15 characters (XXXXX-XXXXXXX-X)
    if(this.value.length > 15){
        this.value = this.value.slice(0,15);
    }
});
document.getElementById("doctorForm").addEventListener("submit", function(e){
    let cnic = cnicInput.value.trim();
    let error = document.getElementById("cnicError");
    let pattern = /^\d{5}-\d{7}-\d{1}$/;
    if(!pattern.test(cnic)){
        error.innerText = "CNIC must be in format XXXXX-XXXXXXX-X";
        e.preventDefault();
    } else {
        error.innerText = "";
    }
});

// Phone Validation + Max Length Enforcement
const phoneInput = document.getElementById("phone");
phoneInput.addEventListener("input", function(){
    if(this.value.startsWith("+92")){
        if(this.value.length > 13) this.value = this.value.slice(0,13); // +923XXXXXXXXX
    } else if(this.value.startsWith("03")){
        if(this.value.length > 11) this.value = this.value.slice(0,11); // 03XXXXXXXXX
    } else {
        // Prevent typing beyond max possible
        if(this.value.length > 13) this.value = this.value.slice(0,13);
    }
});
document.getElementById("doctorForm").addEventListener("submit", function(e){
    let phone = phoneInput.value.trim();
    let error = document.getElementById("phoneError");
    let pattern = /^03[0-9]{9}$|^\+923[0-9]{9}$/;
    if(!pattern.test(phone)){
        error.innerText = "Enter valid mobile number (11 digits starting with 03 or +923XXXXXXXXX).";
        e.preventDefault();
    } else {
        error.innerText = "";
    }
});
</script>

{% endblock %}
