{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Recommendation</title>

    <link href="{% static 'images/favicon.png' %}" rel="icon">
    <link href="{% static 'vendor/bootstrap/css/bootstrap.min.css' %}" rel="stylesheet">
  <link href="{% static 'vendor/bootstrap-icons/bootstrap-icons.css' %}" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            /* Background ko desktop par default rakha hai */
            background: url("{% static 'images/hero-bg.jpg' %}") no-repeat center center/cover;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        .main-container {
            width: 100%;
            display: flex;
            /* Desktop par card ko left side par rakhne ke liye */
            justify-content: flex-start; 
            padding-left: 80px;
        }

        .form-card {
            width: 420px;
            padding: 40px;
            /* Background glass effect taake image peeche se halki nazar aaye */
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .form-card h2 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 25px;
            text-align: center;
            color: #1976d2;
        }

        .form-card textarea {
            height: 140px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
        }

        .form-card button {
            width: 100%;
            padding: 12px;
            border-radius: 50px;
            border: none;
            background-color: #1976d2;
            color: white;
            font-weight: 600;
            transition: 0.3s;
        }

        .form-card button:hover {
            background-color: #125aa3;
        }

        /* --- Tablet & Mobile Responsiveness --- */
        @media (max-width: 992px) {
            .main-container {
                /* Card ko screen ke center mein lane ke liye */
                justify-content: center;
                padding-left: 0;
                padding: 20px;
            }

            .form-card {
                /* Mobile par card ki width ko limit kiya taake background hide na ho */
                width: 95%;
                max-width: 380px; 
                padding: 30px;
            }

            body {
                /* Mobile par image ko thoda adjust kiya taake doctor ka face ya stethoscope nazar aaye */
                background-position: 70% center; 
            }
        }

        /* Small Mobile Screens */
        @media (max-width: 480px) {
            .form-card {
                width: 85%;
                padding: 25px;
            }
            .form-card h2 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="form-card">
        <h2>Doctor Recommendation</h2>
        <form method="POST">
            {% csrf_token %}
            <textarea class="form-control" name="symptoms" placeholder="Describe your symptoms..."></textarea>
            <button type="submit">Find Doctor</button>
        </form>
    </div>
</div>
<script src="{% static 'vendor/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
