{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Doctor Recommendation</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: url("{% static 'images/hero-bg.jpg' %}") no-repeat center center/cover;
            display: flex;
            align-items: center;
        }
        .main-container {
            width: 100%;
        }

        .form-card {
            width: 420px;
            margin-left: 80px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            height: 350px;
        }

        .form-card h2 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 25px;
            text-align: center;
            color:#1976d2;
        }

        .form-card textarea {
            height: 140px;
            margin-bottom: 20px;
        }

        .form-card button {
            width: 100%;
            padding: 8px;
            border-radius: 50px;
            border: none;
            background-color: #1976d2;
            color: white;
            font-weight: 500;
        }

        .form-card button:hover {
            background-color:  #125aa3;
        }
         /* Responsive Breakpoints */
        /* Laptop max 992px */
        @media (max-width: 992px) {
            .form-card {
                width: 300px;
                padding: 35px;
            }
        }

        /* Mobile max 556px */
        @media (max-width: 556px) {
            .form-card {
                width: 100%;
                padding: 25px;
                margin: 0 10px;
            }

            .form-card h2 {
                font-size: 20px;
            }

            .form-card textarea {
                height: 120px;
            }

            .form-card button {
                padding: 8px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
<div class="main-container">
    <div class="form-card">
        <h2>Doctor Recommendation</h2>

        <textarea class="form-control" placeholder="Describe your symptoms..."></textarea>
        <button>Find Doctor</button>
    </div>
</div>
</body>
</html>
