{% extends 'hospital/patient/base_patient.html' %}
{% load static %}
{% block title %}Bills{% endblock %}
{% block content %}

<section class="bills-section">
  <div class="bills-container">

    <!-- Heading INSIDE container -->
    <div class="bills-header">
      <h3>My Bills</h3>
    </div>

    <!-- Bills Table -->
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Bill #</th>
            <th>Date</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
          
        </thead>
        <tbody>
          <tr>
            <td colspan="5" style="text-align:center; color:#888;">
              No bills available.
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</section>

{% endblock %}
